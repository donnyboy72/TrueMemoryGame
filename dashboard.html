<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapist/Research Dashboard - TrueMemoryGame</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #646cff;
            --surface: #333;
            --background: #242424;
            --text: rgba(255, 255, 255, 0.87);
        }
        body {
            font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.6em 1.2em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            filter: brightness(1.1);
        }
        .dashboard-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }
        .user-list-card, .detail-card {
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 0.8rem;
            border-bottom: 1px solid #444;
        }
        tr.selected {
            background-color: rgba(100, 108, 255, 0.2);
        }
        tr:hover {
            background-color: #444;
            cursor: pointer;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        canvas {
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 1rem;
        }
        .filters {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        input {
            padding: 0.4rem;
            border-radius: 4px;
            border: 1px solid #444;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>
    <script>
        // --- Authentication Guard ---
        (function() {
            const token = localStorage.getItem('therapist_token');
            if (!token) {
                window.location.href = 'therapist_login.html';
            }
        })();

        function logout() {
            localStorage.removeItem('therapist_token');
            localStorage.removeItem('therapist_user');
            window.location.href = 'therapist_login.html';
        }
    </script>

    <header>
        <div>
            <h1>Research Dashboard</h1>
            <p id="welcomeMsg" style="margin: 0; font-size: 0.9rem; color: #aaa;"></p>
        </div>
        <div>
            <button onclick="exportData()">Export Dataset (CSV)</button>
            <button onclick="location.href='index.html'" style="background: #444; margin-left: 0.5rem;">Return to Game</button>
            <button onclick="logout()" style="background: #ff4444; margin-left: 0.5rem;">Logout</button>
        </div>
    </header>

    <script>
        document.getElementById('welcomeMsg').innerText = 'Logged in as: ' + (localStorage.getItem('therapist_user') || 'Therapist');
    </script>

    <div class="filters">
        <div class="filter-item">
            <label>Min Sessions</label>
            <input type="number" id="minSessions" value="0" onchange="loadUsers()">
        </div>
        <div class="filter-item">
            <label>Date Range (Start)</label>
            <input type="date" id="dateStart" onchange="loadUsers()">
        </div>
        <div class="filter-item">
            <label>Date Range (End)</label>
            <input type="date" id="dateEnd" onchange="loadUsers()">
        </div>
    </div>

    <div class="dashboard-container">
        <div class="user-list-card">
            <h3>Anonymous Users</h3>
            <table id="userTable">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Sessions</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>

        <div class="detail-card" id="detailView" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 id="currentUserID">User: -</h2>
                    <p id="userDetailStats">Total Sessions: - | Last Active: -</p>
                </div>
            </div>
            
            <div class="charts-grid">
                <div>
                    <h4>Reaction Time Trend (ms)</h4>
                    <canvas id="rtChart"></canvas>
                </div>
                <div>
                    <h4>Accuracy (%)</h4>
                    <canvas id="accuracyChart"></canvas>
                </div>
                <div>
                    <h4>Pixel Error Trend (px)</h4>
                    <canvas id="pixelErrorChart"></canvas>
                </div>
            </div>

            <h3>Session History</h3>
            <div style="max-height: 300px; overflow-y: auto;">
                <table id="sessionTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Trials</th>
                            <th>Accuracy</th>
                            <th>RT (ms)</th>
                            <th>Spatial Error</th>
                            <th>Pixel Error</th>
                        </tr>
                    </thead>
                    <tbody id="sessionList">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
